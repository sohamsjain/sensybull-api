databases:
  - name: sensybull-db
    plan: free
    databaseName: sensybull
    user: sensybull
    ipAllowList: []  # only internal access

services:
  # ── API service ───────────────────────────────────────────────────────
  - type: web
    name: sensybull-api
    runtime: docker
    plan: starter
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sensybull-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sensybull-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # set manually after frontend is deployed
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
      - key: RATELIMIT_STORAGE_URI
        fromService:
          name: sensybull-redis
          type: redis
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: SEC_USER_AGENT
        sync: false

  # ── Ingest service ────────────────────────────────────────────────────
  - type: worker
    name: sensybull-ingest
    runtime: docker
    plan: starter
    dockerfilePath: ./services/ingest/Dockerfile
    dockerContext: ./services/ingest
    envVars:
      - key: REDIS_URL
        fromService:
          name: sensybull-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEYS
        sync: false  # comma-separated Groq keys
      - key: SEC_USER_AGENT
        sync: false

  # ── Analysis worker ────────────────────────────────────────────────────
  # Reuses the API image but runs the analysis loop instead of the web server:
  # enriches each filing with second-order financial analysis + a per-company
  # thesis, then fans it out (the "single combined message").
  - type: worker
    name: sensybull-analysis
    runtime: docker
    plan: starter
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    dockerCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sensybull-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sensybull-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEYS
        sync: false  # comma-separated Groq keys
      - key: SEC_USER_AGENT
        sync: false
      - key: RUN_SUBSCRIBER
        value: "false"  # only the web service consumes filing:new
      - key: ANALYSIS_ENABLED
        value: "true"
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO

  # ── Company sync cron job ──────────────────────────────────────────────
  - type: cron
    name: sensybull-company-sync
    runtime: docker
    plan: starter
    schedule: "0 6 * * *"  # daily at 06:00 UTC
    dockerfilePath: ./services/api/Dockerfile.cron
    dockerContext: ./services/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sensybull-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SEC_USER_AGENT
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────
  - type: redis
    name: sensybull-redis
    plan: free
    ipAllowList: []  # only internal access
    maxmemoryPolicy: allkeys-lru
