version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./services/api
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./services/api/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
    command: python main.py

  ingest:
    build: ./services/ingest
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./services/ingest/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/ingest:/app
    command: python main.py

  web:
    build: ./services/web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./services/web:/app
      - /app/node_modules

networks:
  default:
    name: sensybull-net
