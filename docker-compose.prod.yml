version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sensybull}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sensybull}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sensybull}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./services/api
    restart: always
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sensybull}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sensybull}
    env_file:
      - ./services/api/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: bash -c "flask db upgrade && python main.py"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  ingest:
    build: ./services/ingest
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./services/ingest/.env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:

networks:
  default:
    name: sensybull-net
